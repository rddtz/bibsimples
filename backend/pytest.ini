# ==============================================================================
# bibsimples - Configuração do pytest
# ==============================================================================

[pytest]
# Diretório de testes
testpaths = tests

# Padrões de arquivos de teste
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Modo asyncio padrão
asyncio_mode = auto

# Adiciona flags úteis por padrão
addopts = 
    # Mostra output de print
    -s
    # Mostra nomes dos testes
    -v
    # Mostra warnings
    -W default
    # Para no primeiro erro (descomente para debug)
    # -x

# Marcadores customizados
markers =
    integration: Testes de integração (requerem Biblivre rodando)
    slow: Testes lentos (podem ser ignorados com -m "not slow")

# Ignora diretórios
norecursedirs = 
    .git
    __pycache__
    .pytest_cache
    venv
    env
    .venv

# Configuração de cobertura
[coverage:run]
source = app
omit = 
    app/__init__.py
    app/*/tests/*
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
